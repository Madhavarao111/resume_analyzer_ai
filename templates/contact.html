{% extends "base.html" %}
{% block title %}Contact – ResumeAI Pro{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card" style="max-width:500px">
    <div class="auth-top">
      <div class="auth-logo">📬</div>
      <h1>Contact Us</h1>
      <p>Questions, feedback, or upgrade requests?</p>
    </div>
    {% if success %}
    <div class="alert alert-success">✅ Message sent! We'll reply within 24 hours.</div>
    {% endif %}
    <form method="POST" action="/contact" class="auth-form">
      <div class="form-group"><label>Name</label><input type="text" name="name" placeholder="Your name" required/></div>
      <div class="form-group"><label>Email</label><input type="email" name="email" placeholder="your@email.com" required/></div>
      <div class="form-group"><label>Message</label><textarea name="message" rows="5" placeholder="Your message..." required></textarea></div>
      <button type="submit" class="btn btn-primary btn-full">Send Message →</button>
    </form>
  </div>
</div>
{% endblock %}
