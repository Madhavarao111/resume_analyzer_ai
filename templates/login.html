{% extends "base.html" %}
{% block title %}Login – ResumeAI Pro{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-top"><div class="auth-logo">🧠</div><h1>Welcome Back</h1><p>Login to your account</p></div>
    {% if error %}<div class="alert alert-error">⚠ {{ error }}</div>{% endif %}
    <form method="POST" action="/login" class="auth-form">
      <div class="form-group"><label>Email</label><input type="email" name="email" placeholder="your@email.com" required/></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="Your password" required/></div>
      <button type="submit" class="btn btn-primary btn-full">Login →</button>
    </form>
    <p class="auth-switch">No account? <a href="/register">Sign up free</a></p>
  </div>
</div>
{% endblock %}
