{% extends "base.html" %}
{% block title %}Register – ResumeAI Pro{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-top"><div class="auth-logo">🧠</div><h1>Create Account</h1><p>Start free — 3 analyses per day</p></div>
    {% if error %}<div class="alert alert-error">⚠ {{ error }}</div>{% endif %}
    <form method="POST" action="/register" class="auth-form">
      <div class="form-group"><label>Full Name</label><input type="text" name="name" placeholder="Your name" required/></div>
      <div class="form-group"><label>Email</label><input type="email" name="email" placeholder="your@email.com" required/></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="Min 6 characters" required/></div>
      <button type="submit" class="btn btn-primary btn-full">Create Free Account →</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="/login">Login</a></p>
  </div>
</div>
{% endblock %}
